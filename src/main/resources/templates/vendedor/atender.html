<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillavendedor}">
<head>
    <title>Atención al Cliente - El Rey</title>
</head>
<body>

    <div layout:fragment="contentpaginasvendedor">
        <div class="page-header mb-5">
            <h1 class="page-title"><i class="fe fe-users"></i> Gestión de Atención Comercial</h1>
        </div>

        <!-- PANEL DE BOTONES HORIZONTALES SEGUROS -->
        <div class="row justify-content-center">
            <div class="col-md-5 mb-4">
                <a th:href="@{/vendedor/atender/nuevo}" class="btn btn-lg btn-primary btn-block p-5 shadow-sm" style="border-radius: 8px;">
                    <div style="font-size: 2.5rem;" class="mb-2"><i class="fe fe-user-plus"></i></div>
                    <div class="h2 font-weight-bold m-0">Nuevo Cliente</div>
                    <div class="small opacity-75 mt-2">Registrar datos, GPS y documentos</div>
                </a>
            </div>
            
            <div class="col-md-5 mb-4">
                <a th:href="@{/vendedor/productos}" class="btn btn-lg btn-success btn-block p-5 shadow-sm" style="border-radius: 8px;">
                    <div style="font-size: 2.5rem;" class="mb-2"><i class="fe fe-shopping-cart"></i></div>
                    <div class="h2 font-weight-bold m-0">Volver a Vender</div>
                    <div class="small opacity-75 mt-2">Ir directo al catálogo de juguetes</div>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
