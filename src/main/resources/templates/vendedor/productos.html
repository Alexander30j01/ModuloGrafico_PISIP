<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillavendedor}">
<head>
    <title>Productos - Importadora El Rey</title>
</head>
<body>

    <div layout:fragment="contentpaginasvendedor">
        <!-- Encabezado de la Sección -->
        <div class="page-header mb-4 d-flex flex-wrap justify-content-between align-items-center">
            <h1 class="page-title">
                <i class="fe fe-shopping-cart"></i> Productos Disponibles
            </h1>
            
            <!-- MEJORA 1: Input de búsqueda estéticamente integrado -->
            <div class="page-options d-flex ml-auto col-md-4 col-12 px-0 mt-2 mt-md-0">
                <div class="input-icon w-100">
                    <span class="input-icon-addon">
                        <i class="fe fe-search"></i>
                    </span>
                    <input type="text" id="buscadorProductos" class="form-control" placeholder="Buscar producto o categoría...">
                </div>
            </div>
        </div>

        <!-- Cuadrícula de Productos -->
        <!-- NOTA API: Aquí es donde irá tu th:each="${productos}" cuando conectes el backend -->
        <div class="row row-cards" id="listaProductos">
            
            <!-- Producto 1 -->
            <!-- MEJORA 2: Atributos 'data-' para que JavaScript lea los valores del backend sin esfuerzo -->
            <div class="col-sm-6 col-lg-4 tarjeta-producto" data-id="1" data-nombre="Set de Bloques de Construcción" data-categoria="Juguetes Didácticos">
                <div class="card card-aside d-flex flex-column h-100">
                    <div class="card-body d-flex flex-column p-4">
                        <h4><a href="#" class="text-dark title-producto">Set de Bloques de Construcción</a></h4>
                        <div class="text-muted small mb-3 badge-categoria">Categoría: Juguetes Didácticos</div>
                        
                        <div class="d-flex align-items-center mt-auto">
                            <div class="h3 m-0 text-blue font-weight-bold">$18.50</div>
                            <div class="ml-auto text-muted">
                                <span class="badge badge-success">Stock: 45 uds</span>
                            </div>
                        </div>
                        
                        <!-- MEJORA 3: Input de cantidad integrado para el API de pedidos -->
                        <div class="mt-4 row row-sm">
                            <div class="col-4">
                                <input type="number" id="cant-1" class="form-control text-center font-weight-bold" value="1" min="1" max="45">
                            </div>
                            <div class="col-8">
                                <button class="btn btn-primary btn-block btn-sm font-weight-bold" onclick="agregarAlPedido(1, 18.50)">
                                    <i class="fe fe-plus"></i> Añadir al Pedido
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Producto 2 -->
            <div class="col-sm-6 col-lg-4 tarjeta-producto" data-id="2" data-nombre="Muñeca Articulada Premium" data-categoria="Muñecas">
                <div class="card card-aside d-flex flex-column h-100">
                    <div class="card-body d-flex flex-column p-4">
                        <h4><a href="#" class="text-dark title-producto">Muñeca Articulada Premium</a></h4>
                        <div class="text-muted small mb-3 badge-categoria">Categoría: Muñecas</div>
                        <div class="d-flex align-items-center mt-auto">
                            <div class="h3 m-0 text-blue font-weight-bold">$24.00</div>
                            <div class="ml-auto text-muted">
                                <span class="badge badge-success">Stock: 120 uds</span>
                            </div>
                        </div>
                        <div class="mt-4 row row-sm">
                            <div class="col-4">
                                <input type="number" id="cant-2" class="form-control text-center font-weight-bold" value="1" min="1" max="120">
                            </div>
                            <div class="col-8">
                                <button class="btn btn-primary btn-block btn-sm font-weight-bold" onclick="agregarAlPedido(2, 24.00)">
                                    <i class="fe fe-plus"></i> Añadir al Pedido
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Producto 3 -->
            <div class="col-sm-6 col-lg-4 tarjeta-producto" data-id="3" data-nombre="Carro a Control Remoto 4x4" data-categoria="Vehículos a Escala">
                <div class="card card-aside d-flex flex-column h-100">
                    <div class="card-body d-flex flex-column p-4">
                        <h4><a href="#" class="text-dark title-producto">Carro a Control Remoto 4x4</a></h4>
                        <div class="text-muted small mb-3 badge-categoria">Categoría: Vehículos a Escala</div>
                        <div class="d-flex align-items-center mt-auto">
                            <div class="h3 m-0 text-blue font-weight-bold">$35.90</div>
                            <div class="ml-auto text-muted">
                                <span class="badge badge-danger">Stock: 5 uds</span>
                            </div>
                        </div>
                        <div class="mt-4 row row-sm">
                            <div class="col-4">
                                <input type="number" id="cant-3" class="form-control text-center font-weight-bold" value="1" min="1" max="5">
                            </div>
                            <div class="col-8">
                                <button class="btn btn-primary btn-block btn-sm font-weight-bold" onclick="agregarAlPedido(3, 35.90)">
                                    <i class="fe fe-plus"></i> Añadir al Pedido
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bloque de Scripts listos para Backend -->
    <script layout:fragment="scripts">
        // 1. Buscador Front-End (Para que funcione rápido desde ya)
        document.getElementById('buscadorProductos').addEventListener('input', function(e) {
            const busqueda = e.target.value.toLowerCase();
            const tarjetas = document.querySelectorAll('.tarjeta-producto');
            
            tarjetas.forEach(tarjeta => {
                const nombre = tarjeta.getAttribute('data-nombre').toLowerCase();
                const categoria = tarjeta.getAttribute('data-categoria').toLowerCase();
                
                if (nombre.includes(busqueda) || categoria.includes(busqueda)) {
                    tarjeta.style.setProperty("display", "", "important");
                } else {
                    tarjeta.style.setProperty("display", "none", "important");
                }
            });
        });

        // 2. Función preparada para conectar tu API
        function agregarAlPedido(idProducto, precio) {
            // Capturamos cuántas unidades quiere el vendedor
            const cantidad = document.getElementById('cant-' + idProducto).value;
            
            console.log(`Listo para enviar al API -> ID: ${idProducto}, Cantidad: ${cantidad}, Precio: ${precio}`);

            /* 
               PASO DE CONEXIÓN FUTURA:
               Cuando crees tu @PostMapping("/api/pedido/agregar"), solo descomentaremos esto:
               
               fetch('/api/pedido/agregar', {
                   method: 'POST',
                   headers: { 'Content-Type': 'application/json' },
                   body: JSON.stringify({ productoId: idProducto, cantidad: cantidad })
               })
               .then(res => res.json())
               .then(data => { alert("Producto agregado al pedido"); });
            */
        }
    </script>
</body>
</html>
