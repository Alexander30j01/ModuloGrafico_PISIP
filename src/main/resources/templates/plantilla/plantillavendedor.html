<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="UTF-8">
<meta name="viewport"
	content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<meta http-equiv="Content-Language" content="es" />
<title>Ventas - Importadora El Rey</title>

<!-- Iconos y Fuentes -->
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet"
	href="https://fonts.googleapis.com/css?family=Source Sans Pro:300,400,600,700">

<!-- JS de la plantilla -->
<script th:src="@{/assets/js/require.min.js}"></script>
<script>
	requirejs.config({
		baseUrl : '/'
	});
</script>

<!-- CSS y JS de Tabler -->
<link th:href="@{/assets/css/dashboard.css}" rel="stylesheet" />
<script th:src="@{/assets/js/dashboard.js}"></script>
</head>
<body>
	<div class="page">
		<div class="page-main">

			<!-- ENCABEZADO SUPERIOR (Perfil y Nombre del Vendedor) -->
			<div class="header py-4">
				<div
					class="container d-flex justify-content-between align-items-center">
					<a class="header-brand" th:href="@{/vendedor/inicio}"> <strong
						class="text-blue"><i class="fe fe-package"></i>
							IMPORTADORA EL REY | VENTAS</strong>
					</a>

					<!-- Menú de Usuario y Cerrar Sesión -->
					<div class="d-flex order-lg-2 ml-auto">
						<div class="dropdown">
							<a href="#" class="nav-link pr-0 leading-none"
								data-toggle="dropdown"> <span class="avatar bg-blue-lt"><i
									class="fe fe-user"></i></span> <span class="ml-2 d-none d-lg-block">
									<span class="text-default">Juan Pérez</span> <small
									class="text-muted d-block mt-1">Vendedor de Campo</small>
							</span>
							</a>
							<div
								class="dropdown-menu dropdown-menu-right dropdown-menu-arrow">
								<a class="dropdown-item" href="#"> <i
									class="dropdown-icon fe fe-user"></i> Mi Perfil
								</a>
								<div class="dropdown-divider"></div>
								<!-- Ruta estándar de salida de sesión -->
								<a class="dropdown-item text-danger" th:href="@{/logout}"> <i
									class="dropdown-icon fe fe-log-out text-danger"></i> Cerrar
									Sesión
								</a>
							</div>
						</div>
					</div>
				</div>
			</div>

			<!-- MENÚ PRINCIPAL DE NAVEGACIÓN (Rutas del Controlador) -->
			<div class="header collapse d-lg-flex p-0" id="headerMenuCollapse">
				<div class="container">
					<ul class="nav nav-tabs border-0 flex-column flex-lg-row">

						<!-- Enlace a Inicio -->
						<li class="nav-item"><a th:href="@{/vendedor/inicio}"
							class="nav-link"> <i class="fe fe-home"></i> Inicio
						</a></li>

						<!-- Enlace a Atender Cliente -->
						<li class="nav-item"><a th:href="@{/vendedor/atender}"
							class="nav-link"> <i class="fe fe-users"></i> Atender Cliente
						</a></li>
						
						<!-- Enlace a Catálogo -->
						<li class="nav-item"><a th:href="@{/vendedor/productos}"
							class="nav-link"> <i class="fe fe-book"></i>
								Productos
						</a></li>

						<li class="nav-item"><a th:href="@{/vendedor/carrito}"
							class="nav-link"> <i class="fe fe-shopping-cart"></i> Pedido
						</a></li>

						

					</ul>
				</div>
			</div>

			<!-- CONTENIDO DINÁMICO DE LAS PÁGINAS HIJAS -->
			<div class="my-3 my-md-5">
				<div class="container" layout:fragment="contentpaginasvendedor"></div>
			</div>

		</div>

		<!-- PIE DE PÁGINA -->
		<footer class="footer">
			<div class="container text-center">
				Copyright © 2026 <a href="#">Importadora El Rey</a>. Todos los
				derechos reservados.
			</div>
		</footer>

	</div>
</body>
</html>
